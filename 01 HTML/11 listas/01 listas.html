    <!-- Las listas en HTML sirven para listar contenido. En función del tipo de contenido de nuestra lista tenemos tres tipos de listas 
     
        ul -> unordered list: Se utlizan cuando el orden de los elementos no influyen (lista de la compra) tiene el atributo type con los valores (disc, square, circle)

        ol -> ordenred list: se utilizan cuando el orden de los elementos es importante (top 10) tiene el atributo type con los valores (1, A, a, I, i) y el atributo start (el valor que queremos que inicie)

        Cada elemento de la lista se representa con la etiqueta <li>, tanto en las ul como en las ol.

        dl -> definition list: se utilizan para gacer una lista de definiciones (diccionario)

        Cada elemento de una lista de definicion lleva 2 etiquetas:
            
            dt -> Definition term: el termino que vamos a definir.
            dd -> definition description: la descripcion del termino. 
    
    -->
