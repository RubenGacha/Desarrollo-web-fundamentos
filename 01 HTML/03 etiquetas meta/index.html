<!DOCTYPE html>
<html lang="es">
<head>

    <!-- Permite los caracteres especiales   -->
    <meta charset="UTF-8"> 
    
    <!-- 
    Configura la escala y el ancho para dispositivos móviles (Responsive Design) 
    initial-scale = 1.0 es igual a decirle zoom 100%, 2.0 = 200%, 0.5 = 50%
    -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">


    <!-- SEO: Se recomienda una descripción breve (aprox. 150-160 caracteres) -->
    <meta name="description" content="descripcion del contenido de la pagina">


    <title>Meta etiquetas</title>
</head>
<body>
    
</body>
</html>
