    <!-- 
    Atributos:

    Los atributos son valores adicionales que configuran los elementos y/o ajustan
    su comportamiento.

    En terminos generales hay dos tipos de atributos

    + comunes: su sintaxis es -> atributo = "valor"
    + booleanos: su sintaxis es -> atributo

    Ejemplo

    <html lang="es"> el atributo es lang="es" y indica que el lenguaje a usar sera español
   
    <meta charset="UTF-8"> el atributo es Charset="UTF-8" y indica que se usara caracteres especiales utf-8

    Atributos Globales:

    Algunos atributos globales que están disponibles para la mayoria de etiquetas en HTML.

    + class -> Este atributo se usa para dar estilos a través de CSS
    
    + id -> Es un identificador único que se utiliza para seleccionar el elemento desde JS y para hacer navegación a traves de anclas.

    + title -> Es un atributo que ayuda a la accesibilidad mostrando una descripción del elemento al que pertenece, aparece en un mensaje tooltip.

    + data-* -> Es un atributo que nos permite guardar algun valor en la etiqueta HTMl
    
    -->

    

</body>
